name: Deploy Backend

on:
  push:
    branches: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build and Push
      run: |
        docker build -t ${{ secrets.ECR_REGISTRY }}/tienda-backend:latest .
        docker push ${{ secrets.ECR_REGISTRY }}/tienda-backend:latest
    
    - name: Deploy to EC2
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REGISTRY }}/tienda-backend:latest",
            "docker stop tienda-backend || true",
            "docker rm tienda-backend || true",
            "docker run -d --name tienda-backend -p 3001:3001 --restart unless-stopped -e DB_HOST=${{ secrets.DB_HOST }} -e DB_USER=root -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${{ secrets.ECR_REGISTRY }}/tienda-backend:latest"
          ]'